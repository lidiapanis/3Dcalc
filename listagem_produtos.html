<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Produtos</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            margin: 20px auto;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }
        #searchBar {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex-grow: 1;
            min-width: 200px;
        }
        .sort-buttons button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.3s;
        }
        .sort-buttons button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        td.col-imagem {
            width: 60px;
            text-align: center;
            padding: 6px;
        }

        td.col-imagem img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
            margin: auto;
        }
        th {
            background-color: #f2f2f2;
            color: #333;
        }
        .actions button {
            padding: 5px 10px;
            margin-right: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .edit-btn {
            background-color: #ffc107;
            color: #333;
        }
        .delete-btn {
            background-color: #dc3545;
            color: white;
        }
        #feedback {
            text-align: center;
            margin-top: 20px;
            color: #e66a2e;
            font-weight: bold;
        }
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #007bff; /* Azul */
            font-size: 1.8em;
            text-decoration: none;
            transition: color 0.3s;
        }

        .home-btn:hover {
            color: #0056b3;
        }
    </style>
    <link rel="stylesheet" href="dark-mode.css">
    <script src="theme.js"></script>
</head>
<body>
    <a href="home.html" class="home-btn" title="Voltar para a Página Inicial">
        <i class="fas fa-home"></i>
    </a>
    <div class="container">
        <h1>Produtos Cadastrados</h1>
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Buscar por Nome da Peça...">
            <div class="sort-buttons">
                <button onclick="ordenarTabela('id')">Ordenar por ID</button>
                <button onclick="ordenarTabela('nomePeca')">Ordenar por Nome</button>
            </div>
            <a href="cadastro_produtos.html" style="text-decoration: none;">
                 <button style="background-color: #28a745; margin-left: 20px;">+ Novo Produto</button>
            </a>
        </div>
        
        <table id="produtosTable">
            <thead>
                <tr>
                    <th>Imagem</th>
                    <th>ID</th>
                    <th>Nome da Peça</th>
                    <th>Custo Total</th>
                    <th>Preço de Venda</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <p id="feedback"></p>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO E INICIALIZAÇÃO DO FIREBASE (NO TOPO) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCkGTyw1o7_XGpnXF9-dFwXyCxRZyJOG4c",
            authDomain: "calculo3d.firebaseapp.com",
            databaseURL: "https://calculo3d-default-rtdb.firebaseio.com",
            projectId: "calculo3d",
            storageBucket: "calculo3d.firebasestorage.app",
            messagingSenderId: "372705279593",
            appId: "1:372705279593:web:0b584c7a71dd3675a96cf8",
            measurementId: "G-V2QT1GVLS0"
        };
    
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        const CAMINHO_RTDB = "produtos"; 
        
        let produtosData = [];
        let currentSort = 'id';
    
        // --- 2. FUNÇÕES DE UTILIDADE E RENDERIZAÇÃO (MOVIDAS PARA CIMA) ---
    
        function formatarMoeda(valor) {
            return `R$ ${parseFloat(valor).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, ".")}`;
        }
        
        function formatarData(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleDateString('pt-BR');
        }
        
        // As funções de renderização, ordenação e filtro são chamadas pelo carregarProdutos,
        // então elas precisam vir antes.
        
        window.ordenarTabela = function(key) {
            currentSort = key;
            if (key === 'id') {
                produtosData.sort((a, b) => a.id - b.id);
            } else if (key === 'nomePeca') {
                produtosData.sort((a, b) => a.nomePeca.localeCompare(b.nomePeca));
            }
            aplicarFiltro();
        }
    
        window.aplicarFiltro = function() {
            const searchText = document.getElementById('searchBar').value.toLowerCase();
            const filteredData = produtosData.filter(item => 
                item.nomePeca.toLowerCase().includes(searchText)
            );
            renderizarTabela(filteredData);
        }
    
        function renderizarTabela(data) {
            const tbody = document.getElementById('produtosTable').querySelector('tbody');
            tbody.innerHTML = ''; 
    
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Nenhum produto encontrado.</td></tr>';
                return;
            }

            data.forEach(item => {
                const row = tbody.insertRow();

                const imgCell = row.insertCell();
                imgCell.className = 'col-imagem';
                if (item.imagemUrl) {
                    const img = document.createElement('img');
                    img.src = item.imagemUrl;
                    img.alt = item.nomePeca;
                    imgCell.appendChild(img);
                }

                row.insertCell().textContent = item.id;
                row.insertCell().textContent = item.nomePeca;
                row.insertCell().textContent = formatarMoeda(item.custoTotal);
                row.insertCell().textContent = formatarMoeda(item.precoVenda);
                row.insertCell().textContent = formatarData(item.dataCriacao);
                
                const actionsCell = row.insertCell();
                actionsCell.className = 'actions';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = 'Editar';
                editBtn.onclick = () => editarProduto(item.id);
                actionsCell.appendChild(editBtn);
    
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Deletar';
                deleteBtn.onclick = () => deletarProduto(item.id);
                actionsCell.appendChild(deleteBtn);
            });
        }
    
        // --- 3. FUNÇÕES CRUD E INICIALIZAÇÃO (QUE CHAMAM AS FUNÇÕES ACIMA) ---
    
        function carregarProdutos() {
            document.getElementById('feedback').textContent = "Carregando dados...";
            database.ref(CAMINHO_RTDB).once('value', (snapshot) => {
                produtosData = [];
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const id = childSnapshot.key; 
                    
                    produtosData.push({
                        id: parseInt(id),
                        chaveFirebase: id,
                        nomePeca: data.nomePeca,
                        custoTotal: data.custoTotal,
                        precoVenda: data.precoVenda,
                        dataCriacao: data.dataCriacao,
                        imagemUrl: data.imagemUrl || null
                    });
                });
                
                document.getElementById('feedback').textContent = "";
                ordenarTabela(currentSort); // Chama a função que agora está definida acima
            });
        }
    
        window.deletarProduto = function(id) {
            if (confirm(`Tem certeza que deseja deletar o Produto # ${id}?`)) {
                database.ref(CAMINHO_RTDB + '/' + id).remove()
                    .then(() => {
                        alert(`Produto # ${id} deletado com sucesso!`);
                        carregarProdutos();
                    })
                    .catch((error) => {
                        alert("Erro ao deletar: " + error.message);
                        console.error("Erro ao deletar documento: ", error);
                    });
            }
        }
        
        window.editarProduto = function(id) {
            window.location.href = `cadastro_produtos.html?id=${id}`;
        }
    
        // --- 4. PROTEÇÃO DE PÁGINA E INICIALIZAÇÃO DE EVENTOS ---
    
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                carregarProdutos(); // Inicia o carregamento
                document.getElementById('searchBar').addEventListener('keyup', aplicarFiltro);
            }
        });
    </script>
</body>
</html>
