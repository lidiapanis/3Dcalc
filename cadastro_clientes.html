<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Estilos CSS (inalterados) */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); max-width: 500px; width: 100%; }
        h1 { color: #333; text-align: center; margin-bottom: 25px; }
        fieldset { border: 1px solid #ccc; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
        legend { font-weight: bold; color: #007bff; padding: 0 10px; }
        label { display: block; margin-top: 10px; font-weight: 500; color: #555; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; transition: background-color 0.3s; margin-top: 15px; }
        button:hover { background-color: #218838; }
        .feedback { text-align: center; margin-top: 15px; font-weight: bold; color: #007bff; }
        .home-btn { position: absolute; top: 20px; left: 20px; color: #007bff; font-size: 1.8em; text-decoration: none; transition: color 0.3s; }
        .home-btn:hover { color: #0056b3; }
    </style>
</head>
<body>
    <a href="home.html" class="home-btn" title="Voltar para a Página Inicial">
        <i class="fas fa-home"></i>
    </a>
    <div class="container">
        <h1>Cadastro de Clientes</h1>
        <form id="clientForm">
            <fieldset>
                <legend>Dados do Cliente</legend>
                <label for="nome">Nome do Cliente:</label>
                <input type="text" id="nome" required>

                <label for="endereco">Endereço:</label>
                <input type="text" id="endereco" required>
                
                <label for="telefone">Telefone de Contato:</label>
                <input type="text" id="telefone" required>
            </fieldset>

            <button type="button" onclick="iniciarCadastro()">Salvar Cliente</button>
        </form>
        <p id="feedback" class="feedback"></p>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO E INICIALIZAÇÃO DO FIREBASE (NO TOPO) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCkGTyw1o7_XGpnXF9-dFwXyCxRZyJOG4c",
            authDomain: "calculo3d.firebaseapp.com",
            databaseURL: "https://calculo3d-default-rtdb.firebaseio.com",
            projectId: "calculo3d",
            storageBucket: "calculo3d.firebasestorage.app",
            messagingSenderId: "372705279593",
            appId: "1:372705279593:web:0b584c7a71dd3675a96cf8",
            measurementId: "G-V2QT1GVLS0"
        };
    
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();
        const CAMINHO_RTDB = "clientes";
        const CAMINHO_CONTADOR = "contador_clientes/proximoId";
        
        let idEmEdicao = null; 

        // --- 2. PROTEÇÃO DE PÁGINA E INICIALIZAÇÃO ---
        
        auth.onAuthStateChanged(user => {
            if (!user) {
                // Redireciona se não estiver logado
                window.location.href = 'login.html';
            } else {
                // SE ESTIVER LOGADO, inicializa o modo de edição/cadastro
                verificarModoEdicao(); 
            }
        });
    
        // --- 3. LÓGICA DE INICIALIZAÇÃO E EDIÇÃO ---
        
        function verificarModoEdicao() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
    
            if (id) {
                idEmEdicao = id;
                document.getElementById('feedback').textContent = `Carregando Cliente #${id}...`;
    
                database.ref(CAMINHO_RTDB + '/' + id).once('value')
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            preencherFormulario(snapshot.val());
                        } else {
                            document.getElementById('feedback').textContent = `Erro: Cliente #${id} não encontrado.`;
                        }
                    })
                    .catch((error) => {
                        document.getElementById('feedback').textContent = `Erro ao carregar dados: ${error.message}`;
                        console.error("Erro ao carregar dados de edição:", error);
                    });
            } else {
                document.querySelector('h1').textContent = "Cadastro de Clientes";
                document.querySelector('button').textContent = "Salvar Cliente";
                document.getElementById('feedback').textContent = "Modo: Novo Cadastro.";
            }
        }
    
        function preencherFormulario(dados) {
            document.getElementById('nome').value = dados.nome || '';
            document.getElementById('endereco').value = dados.endereco || '';
            document.getElementById('telefone').value = dados.telefone || '';
    
            document.querySelector('h1').textContent = `Editar Cliente #${idEmEdicao}`;
            document.querySelector('button').textContent = "Atualizar Cliente";
            document.getElementById('feedback').textContent = `Dados do Cliente #${idEmEdicao} carregados.`;
        }
    
        // --- 4. LÓGICA DE SALVAMENTO UNIFICADA ---
        
        window.iniciarCadastro = function(idExistente = null) {
            const nome = document.getElementById('nome').value;
            const endereco = document.getElementById('endereco').value;
            const telefone = document.getElementById('telefone').value;
    
            if (!nome || !endereco || !telefone) {
                alert("Por favor, preencha todos os campos.");
                return;
            }
            
            const dados = { nome, endereco, telefone, dataCriacao: new Date().toISOString() };
            
            if (idEmEdicao) {
                salvarCliente(idEmEdicao, dados, 'atualizado');
            } else {
                obterProximoId(dados);
            }
        }
    
        function obterProximoId(dados) {
            document.getElementById('feedback').textContent = "Buscando ID sequencial...";
            
            database.ref(CAMINHO_CONTADOR).transaction((currentData) => {
                let proximoId = currentData === null ? 1 : currentData + 1;
                return proximoId;
            })
            .then(result => {
                if (result.committed) {
                    const idParaSalvar = result.snapshot.val();
                    salvarCliente(idParaSalvar, { ...dados, idSequencial: idParaSalvar }, 'salvo');
                } else {
                    document.getElementById('feedback').textContent = "Falha temporária na transação. Tente novamente.";
                }
            })
            .catch(error => {
                document.getElementById('feedback').textContent = "Erro ao obter ID: " + error.message;
                console.error("Erro transacional: ", error);
            });
        }
    
        function salvarCliente(id, dados, acao) {
            database.ref(CAMINHO_RTDB + '/' + id).set(dados)
                .then(() => {
                    document.getElementById('feedback').textContent = `Cliente #${id} ${acao} com sucesso!`;
                    
                    if (acao === 'salvo') {
                       document.getElementById('clientForm').reset();
                    }
    
                    setTimeout(() => {
                        window.location.href = 'listagem_clientes.html';
                    }, 1500);
                })
                .catch((error) => {
                    document.getElementById('feedback').textContent = `Erro ao ${acao}r: ` + error.message;
                    console.error(`Erro ao ${acao}r documento: `, error);
                });
        }
    </script>
</body>
</html>
