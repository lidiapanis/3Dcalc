<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Autorizando Mercado Livre...</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f7f6; }
    .box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    .icon { font-size: 3em; margin-bottom: 16px; }
    h2 { margin: 0 0 8px; color: #333; }
    p { color: #666; font-size: 0.9em; }
    .spinner { width: 36px; height: 36px; border: 4px solid #eee; border-top-color: #e66a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="box" id="box">
  <div class="spinner"></div>
  <h2>Autorizando...</h2>
  <p>Trocando código de autorização pelo token de acesso.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get("code");
  const error  = params.get("error");

  function showResult(ok, msg) {
    const box = document.getElementById("box");
    box.innerHTML = `
      <div class="icon">${ok ? "✅" : "❌"}</div>
      <h2>${ok ? "Mercado Livre autorizado!" : "Erro na autorização"}</h2>
      <p>${msg}</p>
      ${ok ? "<p><small>Pode fechar esta aba e voltar ao sistema.</small></p>" : ""}`;
  }

  async function exchange(code) {
    const resp = await fetch("/api/monitor/ml-auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const json = await resp.json();
    if (!json.success) throw new Error(json.error);
    return json.data;
  }

  if (error) {
    showResult(false, "O Mercado Livre retornou: " + error);
  } else if (!code) {
    showResult(false, "Nenhum código de autorização encontrado na URL.");
  } else {
    exchange(code)
      .then(d => showResult(true, d.message || "Token salvo com sucesso."))
      .catch(e => showResult(false, e.message));
  }
</script>
</body>
</html>
