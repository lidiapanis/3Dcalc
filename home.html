<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Precificação 3D</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg:        #f0f2f5;
            --sidebar-bg:#1e3c72;
            --sidebar-hover:#2a5298;
            --sidebar-active:#3a6fd8;
            --text:      #333;
            --text-light:#ffffff;
            --text-muted:#6a7c93;
            --topbar-bg: #ffffff;
            --topbar-shadow: 0 2px 8px rgba(0,0,0,0.08);
            --iframe-border: none;
        }
        [data-theme="dark"] {
            --bg:        #121212;
            --sidebar-bg:#1a1a2e;
            --sidebar-hover:#16213e;
            --sidebar-active:#0f3460;
            --text:      #e0e0e0;
            --text-light:#ffffff;
            --text-muted:#aaa;
            --topbar-bg: #1e1e1e;
            --topbar-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: width 0.3s, background 0.3s;
            z-index: 100;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo h2 {
            color: #fff;
            font-size: 1.1em;
            font-weight: 700;
            line-height: 1.3;
        }
        .sidebar-logo span {
            color: #90caf9;
            font-size: 0.78em;
            font-weight: 400;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .nav-section-title {
            color: rgba(255,255,255,0.4);
            font-size: 0.7em;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 14px 20px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.92em;
            border-left: 3px solid transparent;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            text-decoration: none;
        }
        .nav-item:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }
        .nav-item.active {
            background: var(--sidebar-active);
            border-left-color: #90caf9;
            color: #fff;
            font-weight: 600;
        }
        .nav-item i {
            width: 18px;
            text-align: center;
            font-size: 1em;
            opacity: 0.85;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 0;
        }

        /* dark mode toggle */
        .dark-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85em;
        }
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-slider:before {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            left: 3px; top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        input:checked + .toggle-slider { background: #3a6fd8; }
        input:checked + .toggle-slider:before { transform: translateX(18px); }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: var(--topbar-bg);
            box-shadow: var(--topbar-shadow);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .topbar-title {
            font-size: 1em;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-user {
            font-size: 0.85em;
            color: var(--text-muted);
        }

        .content-frame {
            flex: 1;
            border: none;
            width: 100%;
            background: var(--bg);
            transition: background 0.3s;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2><i class="fas fa-cube" style="color:#90caf9;margin-right:8px;"></i>Precificação 3D</h2>
            <span>Sistema de gestão</span>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">Visão Geral</div>
            <button class="nav-item active" onclick="navegar('dashboard.html', this, 'Dashboard')">
                <i class="fas fa-chart-pie"></i> Dashboard
            </button>

            <div class="nav-section-title">Orçamentos</div>
            <button class="nav-item" onclick="navegar('cadastro_orcamentos.html', this, 'Criar Orçamento')">
                <i class="fas fa-file-signature"></i> Criar Orçamento
            </button>
            <button class="nav-item" onclick="navegar('listagem_orcamentos.html', this, 'Listar Orçamentos')">
                <i class="fas fa-file-invoice"></i> Listar Orçamentos
            </button>

            <div class="nav-section-title">Clientes</div>
            <button class="nav-item" onclick="navegar('cadastro_clientes.html', this, 'Cadastrar Cliente')">
                <i class="fas fa-user-plus"></i> Cadastrar Cliente
            </button>
            <button class="nav-item" onclick="navegar('listagem_clientes.html', this, 'Listar Clientes')">
                <i class="fas fa-list-ul"></i> Listar Clientes
            </button>

            <div class="nav-section-title">Produtos</div>
            <button class="nav-item" onclick="navegar('cadastro_produtos.html', this, 'Cadastrar Produto')">
                <i class="fas fa-calculator"></i> Cadastrar Produto
            </button>
            <button class="nav-item" onclick="navegar('listagem_produtos.html', this, 'Listar Produtos')">
                <i class="fas fa-boxes"></i> Listar Produtos
            </button>
        </nav>

        <div class="sidebar-footer">
            <div class="dark-toggle">
                <span><i class="fas fa-moon" style="margin-right:6px;"></i>Dark Mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="darkToggle" onchange="toggleDark(this)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <button class="nav-item" onclick="handleLogout()" style="color:rgba(255,120,120,0.9);">
                <i class="fas fa-sign-out-alt"></i> Sair do Sistema
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
        <div class="topbar">
            <span class="topbar-title" id="topbarTitle">Dashboard</span>
            <span class="topbar-user" id="topbarUser"></span>
        </div>
        <iframe class="content-frame" id="contentFrame" src="dashboard.html"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkGTyw1o7_XGpnXF9-dFwXyCxRZyJOG4c",
            authDomain: "calculo3d.firebaseapp.com",
            databaseURL: "https://calculo3d-default-rtdb.firebaseio.com",
            projectId: "calculo3d",
            storageBucket: "calculo3d.firebasestorage.app",
            messagingSenderId: "372705279593",
            appId: "1:372705279593:web:0b584c7a71dd3675a96cf8",
            measurementId: "G-V2QT1GVLS0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('topbarUser').textContent = user.email;
            }
        });

        function getTheme() {
            return document.documentElement.getAttribute('data-theme') || 'light';
        }

        function enviarTemaPraIframe() {
            const frame = document.getElementById('contentFrame');
            if (frame && frame.contentWindow) {
                frame.contentWindow.postMessage({ type: 'SET_THEME', theme: getTheme() }, '*');
            }
        }

        // Sempre que o iframe terminar de carregar, envia o tema atual
        document.getElementById('contentFrame').addEventListener('load', enviarTemaPraIframe);

        function navegar(pagina, btn, titulo) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('contentFrame').src = pagina;
            document.getElementById('topbarTitle').textContent = titulo;
        }

        function toggleDark(checkbox) {
            const theme = checkbox.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            enviarTemaPraIframe();
        }

        // Restaurar tema salvo
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('darkToggle').checked = true;
        }

        window.handleLogout = function () {
            auth.signOut().then(() => window.location.href = 'login.html');
        };
    </script>
</body>
</html>
